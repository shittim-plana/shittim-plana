name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # 매일 자정(UTC)에 자동으로 통계 갱신
  workflow_dispatch: # 수동으로 즉시 실행하고 싶을 때 사용
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: shittim-plana
          template: classic
          base: "" # 기본 프로필 정보는 제외하고 오직 언어 통계만 생성
          plugin_languages: yes
          plugin_languages_ignored: "" # 순수 마크업 언어는 제외하고 싶을 때 지정
          plugin_languages_details: bytes-size, percentage
          config_transparent: yes # 배경을 투명하게 설정
