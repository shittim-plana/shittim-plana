name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: shittim-plana
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: ""
          plugin_languages_details: bytes-size, percentage
